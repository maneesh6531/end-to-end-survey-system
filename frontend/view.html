<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SurveyPulse — View All</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
.inner { max-width:980px; margin:0 auto; padding:24px 16px 48px; }
.topbar { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
.topbar-left h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:var(--text); letter-spacing:-0.5px; }
.topbar-left p  { font-size:12px; color:var(--muted); margin-top:2px; }
.chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.chip { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:7px 12px; display:flex; align-items:baseline; gap:6px; }
.chip-n { font-family:'Syne',sans-serif; font-weight:700; font-size:17px; color:var(--text); }
.chip-l { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.controls { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
.s-wrap { position:relative; flex:1; min-width:180px; }
.s-wrap .iicon { color:var(--accent2); opacity:0.55; }
.s-wrap input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:9px 11px 9px 33px; font-size:13px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
.s-wrap input::placeholder { color:var(--muted2); }
.s-wrap input:focus { border-color:rgba(34,211,238,0.4); box-shadow:0 0 0 3px rgba(34,211,238,0.08); }
.fsel { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:9px; padding:9px 12px; font-size:12.5px; font-family:'DM Sans',sans-serif; color:var(--muted); outline:none; cursor:pointer; transition:border-color 0.2s; appearance:none; -webkit-appearance:none; }
.fsel:focus { border-color:rgba(129,140,248,0.35); }
.fsel option { background:#0e101c; }
.tbl-wrap { background:rgba(255,255,255,0.025); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
.tbl-shine { height:1px; background:linear-gradient(90deg,transparent,rgba(129,140,248,0.4),rgba(34,211,238,0.35),transparent); }
table { width:100%; border-collapse:collapse; }
thead th { padding:10px 14px; text-align:left; font-size:10.5px; font-weight:600; color:var(--muted); letter-spacing:0.7px; text-transform:uppercase; border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none; background:rgba(255,255,255,0.02); }
thead th:hover { color:var(--text); }
thead th.sorted { color:var(--accent); }
.sarr { margin-left:3px; opacity:0.4; font-size:9px; }
thead th.sorted .sarr { opacity:1; }
tbody tr { border-bottom:1px solid rgba(255,255,255,0.035); transition:background 0.12s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:rgba(255,255,255,0.025); }
td { padding:10px 14px; font-size:13px; color:var(--text); vertical-align:middle; }
.td-name { font-weight:600; }
.td-city { display:inline-flex; align-items:center; padding:2px 8px; border-radius:99px; font-size:11px; background:rgba(34,211,238,0.09); color:var(--accent2); border:1px solid rgba(34,211,238,0.18); }
.td-sal  { font-family:'Syne',sans-serif; font-size:12px; color:var(--green); }
.td-date { font-size:11px; color:var(--muted); white-space:nowrap; }
.act-btns { display:flex; gap:5px; }
.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.empty svg { width:36px; height:36px; opacity:0.2; display:block; margin:0 auto 10px; }
.empty h3 { font-family:'Syne',sans-serif; font-size:16px; color:var(--text); margin-bottom:4px; }
.empty p  { font-size:12px; }
.pgn { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-top:1px solid var(--border); flex-wrap:wrap; gap:8px; }
.pgn-info { font-size:11.5px; color:var(--muted); }
.pgn-btns { display:flex; gap:4px; }
.pgn-btn { width:28px; height:28px; border-radius:7px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--muted); font-size:11.5px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.15s,color 0.15s; font-family:'Syne',sans-serif; font-weight:700; }
.pgn-btn:hover { background:rgba(255,255,255,0.08); color:var(--text); }
.pgn-btn.active { background:rgba(129,140,248,0.14); border-color:rgba(129,140,248,0.35); color:var(--accent); }
.pgn-btn:disabled { opacity:0.3; cursor:default; pointer-events:none; }
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grain"></div>

<nav></nav>

<div class="page">
  <div class="inner">
    <div class="topbar a1">
      <div class="topbar-left">
        <h1>All Entries</h1>
        <p>Search, filter and browse every survey record.</p>
      </div>
      <!-- Add New only shown to admins -->
      <div id="addBtn"></div>
    </div>

    <div class="chips a2">
      <div class="chip"><div class="chip-n" id="cTotal">—</div><div class="chip-l">Total</div></div>
      <div class="chip"><div class="chip-n" id="cShow">—</div><div class="chip-l">Showing</div></div>
      <div class="chip"><div class="chip-n" id="cCities">—</div><div class="chip-l">Cities</div></div>
      <div class="chip"><div class="chip-n" id="cAvgAge">—</div><div class="chip-l">Avg Age</div></div>
    </div>

    <div class="controls a3">
      <div class="s-wrap">
        <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="qSearch" placeholder="Search name, city, profession…">
      </div>
      <select class="fsel" id="fCity"><option value="">All Cities</option></select>
      <select class="fsel" id="fProf"><option value="">All Professions</option></select>
      <button class="btn btn-ghost btn-sm" id="clearBtn">Clear</button>
    </div>

    <div class="tbl-wrap a4">
      <div class="tbl-shine"></div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
            <th>Profession</th>
            <th>Salary</th>
            <th>Date</th>
            <th id="actionsHeader"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="pgn" id="pgn"></div>
    </div>
  </div>
</div>

<script src="/static/shared.js"></script>
<script>
  // 1. Check login
  if (!requireAuth()) throw '';
  // 2. Build nav
  renderNav('view.html');

  const isAdmin = getRole() === 'admin';
  const PER = 10;
  let pg = 1, totalEntries = 0, allData = [];

  // Show Add button only to admins
  if (isAdmin) {
    document.getElementById('addBtn').innerHTML = `<a href="add.html" class="btn btn-primary btn-sm"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add New</a>`;
    document.getElementById('actionsHeader').textContent = 'Actions';
  }

  const fmt = n => n ? '₹' + Number(n).toLocaleString('en-IN') : '—';

  let searchCounter = 0;

  // Fetch all data from API, paging through results so we can search locally
  async function loadAll() {
    const localCounter = ++searchCounter;
    try {
      const q      = document.getElementById('qSearch').value;
      const city   = document.getElementById('fCity').value;
      const prof   = document.getElementById('fProf').value;

      let tempAllData = [];
      let tempTotalEntries = 0;
      const pageSize = 100;            // backend max limit
      let skip = 0;

      while (true) {
        let url = `/entries?limit=${pageSize}&skip=${skip}`;
        if (q)    url += '&search=' + encodeURIComponent(q);
        if (city) url += '&city='   + encodeURIComponent(city);
        if (prof) url += '&profession=' + encodeURIComponent(prof);

        const page = await apiGet(url);
        
        // If a newer load has started, stop this one
        if (localCounter !== searchCounter) return;

        tempAllData.push(...page.entries);
        tempTotalEntries = page.total;
        if (tempAllData.length >= tempTotalEntries) break;
        skip += pageSize;
      }

      // Final check
      if (localCounter !== searchCounter) return;

      allData = tempAllData;
      totalEntries = tempTotalEntries;
      populateFilters();
      render();
    } catch (err) {
      if (localCounter === searchCounter) {
        showToast('Failed to load: ' + err.message, 'error');
      }
    }
  }

  function populateFilters() {
    const cities = [...new Set(allData.map(e => e.city).filter(Boolean))].sort();
    const profs  = [...new Set(allData.map(e => e.profession).filter(Boolean))].sort();
    const cf = document.getElementById('fCity'), pf = document.getElementById('fProf');
    const cv = cf.value, pv = pf.value;
    cf.innerHTML = '<option value="">All Cities</option>'    + cities.map(c => `<option>${c}</option>`).join('');
    pf.innerHTML = '<option value="">All Professions</option>' + profs.map(p => `<option>${p}</option>`).join('');
    cf.value = cv; pf.value = pv;
  }

  function render() {
    const ages = allData.map(e => Number(e.age)).filter(a => a > 0);
    document.getElementById('cTotal').textContent  = totalEntries;
    document.getElementById('cShow').textContent   = allData.length;
    document.getElementById('cCities').textContent = new Set(allData.map(e => e.city).filter(Boolean)).size;
    document.getElementById('cAvgAge').textContent = ages.length ? Math.round(ages.reduce((s,a) => s+a, 0) / ages.length) : '—';

    const pages = Math.max(1, Math.ceil(allData.length / PER));
    if (pg > pages) pg = pages;
    const slice = allData.slice((pg-1)*PER, pg*PER);
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (!allData.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9l-6-6z"/></svg>
        <h3>No entries found</h3><p>${isAdmin ? '<a href="add.html" style="color:var(--accent)">Add the first entry?</a>' : 'No records yet.'}</p>
      </div></td></tr>`;
    } else {
      slice.forEach(e => {
        const tr = document.createElement('tr');
        const actions = isAdmin ? `
          <div class="act-btns">
            <a href="update.html" class="btn btn-ghost btn-sm" title="Edit">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </a>
            <button class="btn btn-danger btn-sm del-btn" data-id="${e.id}" title="Delete">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>` : '';
        tr.innerHTML = `
          <td class="td-name">${e.name||'—'}</td>
          <td>${e.age||'—'}</td>
          <td><span class="td-city">${e.city||'—'}</span></td>
          <td style="color:var(--muted)">${e.profession||'—'}</td>
          <td class="td-sal">${fmt(e.salary)}</td>
          <td class="td-date">${e.created_at||'—'}</td>
          <td>${actions}</td>`;
        tbody.appendChild(tr);
      });

      // Delete buttons (admin only)
      tbody.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', async () => {
        if (!confirm('Delete this entry? This cannot be undone.')) return;
        try {
          await apiDelete('/entries/' + b.dataset.id);
          showToast('Deleted', 'success');
          loadAll();
        } catch (err) {
          showToast('Error: ' + err.message, 'error');
        }
      }));
    }

    // Pagination
    const pgnEl = document.getElementById('pgn');
    const start = (pg-1)*PER+1, end = Math.min(pg*PER, allData.length);
    pgnEl.innerHTML = `<span class="pgn-info">${allData.length ? start+'-'+end+' of '+allData.length : '0 results'}</span><div class="pgn-btns" id="pBtns"></div>`;
    const pb = document.getElementById('pBtns');
    const prev = document.createElement('button'); prev.className='pgn-btn'; prev.textContent='←'; prev.disabled=pg===1;
    prev.addEventListener('click', () => { pg--; render(); }); pb.appendChild(prev);
    const maxPages = Math.min(pages, 7);
    for (let i=1; i<=maxPages; i++) {
      const b = document.createElement('button'); b.className='pgn-btn'+(i===pg?' active':''); b.textContent=i;
      b.addEventListener('click', () => { pg=i; render(); }); pb.appendChild(b);
    }
    const next = document.createElement('button'); next.className='pgn-btn'; next.textContent='→'; next.disabled=pg===pages;
    next.addEventListener('click', () => { pg++; render(); }); pb.appendChild(next);
  }

  // Debounce search so it doesn't call API on every keystroke
  let debounce;
  ['qSearch','fCity','fProf'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => { pg=1; loadAll(); }, 300);
    });
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('qSearch').value = '';
    document.getElementById('fCity').value   = '';
    document.getElementById('fProf').value   = '';
    pg = 1; loadAll();
  });

  // Initial load
  loadAll();
</script>
</body>
</html>
