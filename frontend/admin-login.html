<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SurveyPulse — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=1.2">
<style>
/* Page specific tweaks if any */
</style>
</head>
<body>
<div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grain"></div>

<div class="auth-shell">
  <div class="card auth-card">
    <div class="card-shine"></div>

    <!-- Logo -->
    <div class="logo-row">
      <div class="logo-ico">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="14" width="3" height="7" rx="1.2" fill="white"/>
          <rect x="8" y="9"  width="3" height="12" rx="1.2" fill="white" opacity="0.8"/>
          <rect x="13" y="5" width="3" height="16" rx="1.2" fill="white" opacity="0.6"/>
          <rect x="18" y="2" width="3" height="19" rx="1.2" fill="white" opacity="0.45"/>
        </svg>
      </div>
      <span class="logo-name">SurveyPulse</span>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="loginForm">
      <div class="auth-title">Admin Sign In</div>
      <div class="auth-sub">Enter administrator credentials</div>

      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="loginUsername" placeholder="Enter username" required>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
      </div>

      <button class="btn btn-primary btn-full" style="margin-top:6px" onclick="handleLogin()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In
      </button>

      <div class="role-note">
        Only accounts whose <code>role</code> column is set to "admin" may
        sign in here; regular users should use the normal login page.
      </div>

      <div style="text-align:center;margin-top:18px;">
        <a href="login.html" style="font-size:13px;color:var(--accent);">Back to user login</a>
      </div>
    </div>

  </div>
</div>

<script src="/static/shared.js"></script>
<script>
async function handleLogin() {
  const u = document.getElementById('loginUsername').value;
  const p = document.getElementById('loginPassword').value;
  await doLogin(u, p, true);
}

// Redirect if already logged in
if (getToken()) location.href = 'index.html';
</script>
</body>
</html>
